<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overstimulated Map Builder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            color: #fff;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }

        #container {
            display: flex;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        #mapCanvas {
            background: #000;
            border: 2px solid #666;
            cursor: crosshair;
            flex: 1;
            outline: none;
        }

        .controls {
            background: #222;
            border: 2px solid #444;
            padding: 20px;
            border-radius: 4px;
            width: 350px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .control-group {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #444;
        }

        .control-group:last-child {
            border-bottom: none;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 12px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
            background: #333;
            border: 1px solid #555;
            color: #fff;
            font-family: monospace;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #ff6b6b;
            border: none;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 8px;
        }

        button:hover {
            background: #ff8888;
        }

        button.secondary {
            background: #4db8ff;
        }

        button.secondary:hover {
            background: #66d4ff;
        }

        button.active {
            background: #ffcc00;
            color: #000;
        }

        button.active:hover {
            background: #ffdd33;
        }

        .output {
            background: #1a1a1a;
            border: 1px solid #555;
            padding: 12px;
            border-radius: 4px;
            margin-top: 12px;
            font-size: 11px;
            max-height: 300px;
            overflow-y: auto;
            word-break: break-all;
        }

        h2 {
            font-size: 16px;
            margin-bottom: 12px;
            color: #ff6b6b;
        }

        h3 {
            font-size: 12px;
            margin: 12px 0 8px 0;
            color: #4db8ff;
        }

        .help-text {
            font-size: 11px;
            color: #666;
            margin-top: 8px;
            line-height: 1.4;
        }

        .color-preview {
            width: 100%;
            height: 20px;
            border: 1px solid #555;
            margin-top: 4px;
        }

        .mode-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        .mode-buttons button {
            margin-bottom: 0;
            padding: 8px;
            font-size: 11px;
        }

        .room-list {
            background: #1a1a1a;
            border: 1px solid #555;
            padding: 12px;
            border-radius: 4px;
            margin-top: 12px;
            font-size: 10px;
            max-height: 150px;
            overflow-y: auto;
        }

        .room-item {
            background: rgba(77, 184, 255, 0.1);
            border-left: 3px solid #4db8ff;
            padding: 6px;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .room-item button {
            background: #ff6b6b;
            padding: 3px 6px;
            font-size: 9px;
            margin: 0;
            width: auto;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="mapCanvas" width="1000" height="700" tabindex="0"></canvas>

        <div class="controls">
            <h2>MAP BUILDER</h2>

            <div class="control-group">
                <h3>Build Mode</h3>
                <div class="mode-buttons">
                    <button id="modeRoom" class="active secondary" onclick="setMode('room')">DRAG ROOMS</button>
                    <button id="modeDoor" class="secondary" onclick="setMode('door')">PLACE DOORS</button>
                </div>
                <p class="help-text" id="modeHint">Click and drag on the canvas to create rooms. A name prompt will appear. Walls are auto-generated around all rooms.</p>
            </div>

            <div class="control-group">
                <h3>Add Room (Quick)</h3>
                <label>Room Name:</label>
                <input type="text" id="roomName" placeholder="e.g., Living Room">

                <label>Color:</label>
                <input type="color" id="roomColor" value="#1a3a52">
                <div class="color-preview" id="colorPreview"></div>

                <p class="help-text">Or drag on canvas to create a room visually.</p>
            </div>

            <div class="control-group">
                <h3>Rooms Created</h3>
                <div class="room-list" id="roomList"></div>
            </div>

            <div class="control-group">
                <h3>Export</h3>
                <button class="secondary" onclick="exportAll()">Generate All Code</button>
                <button class="secondary" onclick="exportRooms()">Copy ROOMS Only</button>
                <button class="secondary" onclick="exportWalls()">Copy WALLS Only</button>
                <button class="secondary" onclick="exportDoors()">Copy DOORS Only</button>
                <div class="output" id="output"></div>
            </div>

            <div class="control-group">
                <h3>Actions</h3>
                <button class="secondary" onclick="undoRoom()">Undo Last Room</button>
                <button class="secondary" onclick="regenerateWalls()">Regenerate Auto-Walls</button>
                <button class="secondary" onclick="clearAll()">Clear All</button>
                <label style="margin-top: 12px;">TILE_SIZE = 40</label>
                <label>GAME_WIDTH = 1000</label>
                <label>GAME_HEIGHT = 700</label>
            </div>
        </div>
    </div>

    <script>
        const TILE_SIZE = 40;
        const WALL_THICKNESS = 0.3;
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');

        let rooms = [];
        let doors = [];
        let mode = 'room';
        let dragging = false;
        let dragStart = null;
        let dragCurrent = null;
        let zoom = 1;
        let panX = 0;
        let panY = 0;
        let isPanning = false;
        let panStartX = 0;
        let panStartY = 0;

        function setMode(newMode) {
            mode = newMode;
            document.getElementById('modeRoom').classList.toggle('active', mode === 'room');
            document.getElementById('modeDoor').classList.toggle('active', mode === 'door');

            const hint = document.getElementById('modeHint');
            if (mode === 'room') {
                hint.textContent = 'Click and drag on the canvas to create rooms. Walls are auto-generated around all rooms.';
                canvas.style.cursor = 'crosshair';
            } else {
                hint.textContent = 'Click on gridlines between rooms to place doors. Click door to remove it.';
                canvas.style.cursor = 'pointer';
            }
        }

        function snapToGrid(pixels) {
            return Math.round(pixels / TILE_SIZE) * TILE_SIZE;
        }

        function pixelsToTiles(pixels) {
            return pixels / TILE_SIZE;
        }

        function tilesToPixels(tiles) {
            return tiles * TILE_SIZE;
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const screenX = e.clientX - rect.left;
            const screenY = e.clientY - rect.top;

            // Inverse transform: account for zoom and pan
            const x = (screenX - panX) / zoom;
            const y = (screenY - panY) / zoom;

            return { x, y };
        }

        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 2) {
                // Right mouse button for panning
                isPanning = true;
                panStartX = e.clientX;
                panStartY = e.clientY;
                return;
            }

            const pos = getMousePos(e);

            if (mode === 'room') {
                dragging = true;
                dragStart = { x: snapToGrid(pos.x), y: snapToGrid(pos.y) };
                dragCurrent = dragStart;
            } else if (mode === 'door') {
                handleDoorClick(pos);
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isPanning) {
                const deltaX = e.clientX - panStartX;
                const deltaY = e.clientY - panStartY;
                panX += deltaX;
                panY += deltaY;
                panStartX = e.clientX;
                panStartY = e.clientY;
                render();
                return;
            }

            if (!dragging) return;
            const pos = getMousePos(e);
            dragCurrent = { x: snapToGrid(pos.x), y: snapToGrid(pos.y) };
            render();
        });

        canvas.addEventListener('mouseup', (e) => {
            if (isPanning) {
                isPanning = false;
                return;
            }
            if (!dragging) return;
            dragging = false;

            const minW = TILE_SIZE;
            const minH = TILE_SIZE;
            const w = Math.max(minW, Math.abs(dragCurrent.x - dragStart.x));
            const h = Math.max(minH, Math.abs(dragCurrent.y - dragStart.y));
            const x = Math.min(dragStart.x, dragCurrent.x);
            const y = Math.min(dragStart.y, dragCurrent.y);

            const name = prompt('Room name:', 'Room ' + (rooms.length + 1));
            if (name) {
                const color = document.getElementById('roomColor').value;
                rooms.push({
                    name,
                    x: pixelsToTiles(x),
                    y: pixelsToTiles(y),
                    w: pixelsToTiles(w),
                    h: pixelsToTiles(h),
                    color
                });
                regenerateWalls();
                updateRoomList();
                render();
            }
        });

        function handleDoorClick(pos) {
            const gridX = pixelsToTiles(pos.x);
            const gridY = pixelsToTiles(pos.y);

            // Check if click is on an existing door
            for (let i = 0; i < doors.length; i++) {
                const door = doors[i];
                if (Math.abs(gridX - door.x) < 0.4 && Math.abs(gridY - door.y) < 0.4) {
                    doors.splice(i, 1);
                    render();
                    return;
                }
            }

            // Find adjacent rooms on gridlines
            const tolerance = 0.4;
            const horizontalDoors = [];
            const verticalDoors = [];

            // Check horizontal gridlines (between room top/bottom)
            rooms.forEach(room1 => {
                rooms.forEach(room2 => {
                    if (room1 === room2) return;
                    // Bottom of room1 touches top of room2
                    if (Math.abs(room1.y + room1.h - room2.y) < tolerance) {
                        const overlapX = Math.max(room1.x, room2.x);
                        const overlapXEnd = Math.min(room1.x + room1.w, room2.x + room2.w);
                        if (overlapX < overlapXEnd) {
                            horizontalDoors.push({
                                x: (overlapX + overlapXEnd) / 2,
                                y: room1.y + room1.h,
                                w: 1,
                                h: WALL_THICKNESS,
                                rooms: [room1.name, room2.name]
                            });
                        }
                    }
                });
            });

            // Check vertical gridlines (between room left/right)
            rooms.forEach(room1 => {
                rooms.forEach(room2 => {
                    if (room1 === room2) return;
                    // Right of room1 touches left of room2
                    if (Math.abs(room1.x + room1.w - room2.x) < tolerance) {
                        const overlapY = Math.max(room1.y, room2.y);
                        const overlapYEnd = Math.min(room1.y + room1.h, room2.y + room2.h);
                        if (overlapY < overlapYEnd) {
                            verticalDoors.push({
                                x: room1.x + room1.w,
                                y: (overlapY + overlapYEnd) / 2,
                                w: WALL_THICKNESS,
                                h: 1,
                                rooms: [room1.name, room2.name]
                            });
                        }
                    }
                });
            });

            // Find closest door option
            const allDoors = [...horizontalDoors, ...verticalDoors];
            let closest = null;
            let closestDist = Infinity;

            allDoors.forEach(door => {
                const dist = Math.hypot(gridX - door.x, gridY - door.y);
                if (dist < tolerance && dist < closestDist) {
                    closest = door;
                    closestDist = dist;
                }
            });

            if (closest) {
                // Check if door already exists
                const exists = doors.some(d =>
                    Math.abs(d.x - closest.x) < 0.1 &&
                    Math.abs(d.y - closest.y) < 0.1
                );
                if (!exists) {
                    doors.push(closest);
                    render();
                }
            }
        }

        function regenerateWalls() {
            // Auto-generate walls around all rooms
            // This is implicit in the game logic, but we track wall generation here
        }

        function updateRoomList() {
            const list = document.getElementById('roomList');
            list.innerHTML = '';
            rooms.forEach((room, i) => {
                const item = document.createElement('div');
                item.className = 'room-item';
                item.innerHTML = `
                    <span>${room.name} (${room.w.toFixed(1)}×${room.h.toFixed(1)})</span>
                    <button onclick="deleteRoom(${i})">Del</button>
                `;
                list.appendChild(item);
            });
        }

        function deleteRoom(i) {
            rooms.splice(i, 1);
            doors = doors.filter(d => !d.rooms.includes(rooms[i]?.name));
            updateRoomList();
            render();
        }

        function undoRoom() {
            if (rooms.length > 0) {
                const removed = rooms.pop();
                doors = doors.filter(d => !d.rooms.includes(removed.name));
                updateRoomList();
                render();
            }
        }

        function generateWalls() {
            const walls = [];
            const WALL_TH = WALL_THICKNESS;

            // Create outer boundary walls
            const maxX = Math.max(...rooms.map(r => r.x + r.w), 0);
            const maxY = Math.max(...rooms.map(r => r.y + r.h), 0);

            // Outer walls
            walls.push({ x: 0, y: 0, w: maxX, h: WALL_TH });
            walls.push({ x: 0, y: maxY - WALL_TH, w: maxX, h: WALL_TH });
            walls.push({ x: 0, y: 0, w: WALL_TH, h: maxY });
            walls.push({ x: maxX - WALL_TH, y: 0, w: WALL_TH, h: maxY });

            // Room perimeter walls
            rooms.forEach(room => {
                const x = room.x;
                const y = room.y;
                const w = room.w;
                const h = room.h;

                walls.push({ x, y, w, h: WALL_TH });              // Top
                walls.push({ x, y: y + h - WALL_TH, w, h: WALL_TH });  // Bottom
                walls.push({ x, y, w: WALL_TH, h });              // Left
                walls.push({ x: x + w - WALL_TH, y, w: WALL_TH, h });  // Right
            });

            // Remove walls that overlap with doors
            const filteredWalls = walls.filter(wall => {
                return !doors.some(door => {
                    return wall.x < door.x + door.w && wall.x + wall.w > door.x &&
                           wall.y < door.y + door.h && wall.y + wall.h > door.y;
                });
            });

            return filteredWalls;
        }

        function exportRooms() {
            let code = 'const ROOMS = {\n';
            rooms.forEach((room, i) => {
                const key = room.name.toUpperCase().replace(/\s+/g, '_').replace(/[^A-Z0-9_]/g, '');
                code += `    ${key}: { x: ${room.x}, y: ${room.y}, w: ${room.w}, h: ${room.h}, name: '${room.name}', color: '${room.color}' }`;
                code += i < rooms.length - 1 ? ',\n' : '\n';
            });
            code += '};';
            copyToClipboard(code);
            showOutput(code);
        }

        function exportWalls() {
            const walls = generateWalls();
            let code = 'const WALLS = [\n';
            walls.forEach((wall, i) => {
                code += `    { x: ${wall.x}, y: ${wall.y}, w: ${wall.w}, h: ${wall.h} }`;
                code += i < walls.length - 1 ? ',\n' : '\n';
            });
            code += '];';
            copyToClipboard(code);
            showOutput(code);
        }

        function exportDoors() {
            let code = 'const DOORS = [\n';
            doors.forEach((door, i) => {
                code += `    { x: ${door.x}, y: ${door.y}, w: ${door.w}, h: ${door.h}, name: '${door.rooms[0]} → ${door.rooms[1]}', open: false, connectsTo: ['${door.rooms[0].toUpperCase().replace(/\s+/g, '_').replace(/[^A-Z0-9_]/g, '')}', '${door.rooms[1].toUpperCase().replace(/\s+/g, '_').replace(/[^A-Z0-9_]/g, '')}'] }`;
                code += i < doors.length - 1 ? ',\n' : '\n';
            });
            code += '];';
            copyToClipboard(code);
            showOutput(code);
        }

        function exportAll() {
            exportRooms();
            let allCode = document.getElementById('output').textContent;
            allCode += '\n\n';

            const walls = generateWalls();
            let wallCode = 'const WALLS = [\n';
            walls.forEach((wall, i) => {
                wallCode += `    { x: ${wall.x}, y: ${wall.y}, w: ${wall.w}, h: ${wall.h} }`;
                wallCode += i < walls.length - 1 ? ',\n' : '\n';
            });
            wallCode += '];';
            allCode += wallCode;
            allCode += '\n\n';

            let doorCode = 'const DOORS = [\n';
            doors.forEach((door, i) => {
                doorCode += `    { x: ${door.x}, y: ${door.y}, w: ${door.w}, h: ${door.h}, name: '${door.rooms[0]} → ${door.rooms[1]}', open: false, connectsTo: ['${door.rooms[0].toUpperCase().replace(/\s+/g, '_').replace(/[^A-Z0-9_]/g, '')}', '${door.rooms[1].toUpperCase().replace(/\s+/g, '_').replace(/[^A-Z0-9_]/g, '')}'] }`;
                doorCode += i < doors.length - 1 ? ',\n' : '\n';
            });
            doorCode += '];';
            allCode += doorCode;

            copyToClipboard(allCode);
            showOutput(allCode);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied to clipboard!');
            });
        }

        function showOutput(code) {
            document.getElementById('output').textContent = code;
        }

        function clearAll() {
            if (confirm('Clear all rooms and doors?')) {
                rooms = [];
                doors = [];
                updateRoomList();
                render();
            }
        }

        function render() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Apply zoom and pan transform
            ctx.save();
            ctx.translate(panX, panY);
            ctx.scale(zoom, zoom);

            // Draw grid
            ctx.strokeStyle = 'rgba(100, 100, 100, 0.15)';
            ctx.lineWidth = 1 / zoom;
            for (let x = 0; x <= canvas.width; x += TILE_SIZE) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += TILE_SIZE) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // Draw rooms
            rooms.forEach(room => {
                const px = tilesToPixels(room.x);
                const py = tilesToPixels(room.y);
                const pw = tilesToPixels(room.w);
                const ph = tilesToPixels(room.h);

                ctx.fillStyle = room.color;
                ctx.fillRect(px, py, pw, ph);

                ctx.strokeStyle = '#444';
                ctx.lineWidth = 2;
                ctx.strokeRect(px, py, pw, ph);

                ctx.fillStyle = '#aaa';
                ctx.font = '12px monospace';
                ctx.textAlign = 'left';
                ctx.fillText(room.name, px + 5, py + 18);
            });

            // Draw auto-generated walls
            const walls = generateWalls();
            ctx.fillStyle = 'rgba(80, 80, 80, 0.8)';
            walls.forEach(wall => {
                const px = tilesToPixels(wall.x);
                const py = tilesToPixels(wall.y);
                const pw = tilesToPixels(wall.w);
                const ph = tilesToPixels(wall.h);
                ctx.fillRect(px, py, pw, ph);
            });

            // Draw doors
            doors.forEach(door => {
                const px = tilesToPixels(door.x);
                const py = tilesToPixels(door.y);
                const pw = tilesToPixels(door.w);
                const ph = tilesToPixels(door.h);

                ctx.fillStyle = '#00ff00';
                ctx.fillRect(px, py, pw, ph);
                ctx.strokeStyle = '#00cc00';
                ctx.lineWidth = 2;
                ctx.strokeRect(px, py, pw, ph);
            });

            // Draw drag preview
            if (dragging && dragStart && dragCurrent) {
                const x = Math.min(dragStart.x, dragCurrent.x);
                const y = Math.min(dragStart.y, dragCurrent.y);
                const w = Math.abs(dragCurrent.x - dragStart.x);
                const h = Math.abs(dragCurrent.y - dragStart.y);

                ctx.fillStyle = 'rgba(100, 150, 255, 0.3)';
                ctx.fillRect(x, y, w, h);
                ctx.strokeStyle = '#4db8ff';
                ctx.lineWidth = 2 / zoom;
                ctx.strokeRect(x, y, w, h);
            }

            ctx.restore();

            // Draw zoom/pan info
            ctx.fillStyle = '#666';
            ctx.font = '10px monospace';
            ctx.textAlign = 'left';
            ctx.fillText(`Zoom: ${(zoom * 100).toFixed(0)}% | Q/E: Zoom | WASD/Arrows: Pan`, 5, canvas.height - 5);
        }

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomSpeed = 0.1;
            const oldZoom = zoom;
            zoom += e.deltaY > 0 ? -zoomSpeed : zoomSpeed;
            zoom = Math.max(0.3, Math.min(3, zoom));

            // Zoom toward mouse position
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            panX -= mouseX * (zoom - oldZoom) / oldZoom;
            panY -= mouseY * (zoom - oldZoom) / oldZoom;

            render();
        }, { passive: false });

        canvas.addEventListener('contextmenu', (e) => e.preventDefault());

        // Keyboard controls for zoom and pan
        const keyState = {};
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            keyState[key] = true;

            // Q and E for zoom - with explicit handling
            if (key === 'q') {
                e.preventDefault();
                zoom = Math.max(0.3, zoom - 0.15);
                render();
            } else if (key === 'e') {
                e.preventDefault();
                zoom = Math.min(3, zoom + 0.15);
                render();
            }
        });

        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            keyState[key] = false;
        });

        // Pan with arrow keys or WASD
        setInterval(() => {
            let moved = false;
            const panSpeed = 15;
            if (keyState['arrowup'] || keyState['w']) { panY += panSpeed; moved = true; }
            if (keyState['arrowdown'] || keyState['s']) { panY -= panSpeed; moved = true; }
            if (keyState['arrowleft'] || keyState['a']) { panX += panSpeed; moved = true; }
            if (keyState['arrowright'] || keyState['d']) { panX -= panSpeed; moved = true; }
            if (moved) render();
        }, 16);

        document.getElementById('roomColor').addEventListener('change', (e) => {
            document.getElementById('colorPreview').style.background = e.target.value;
        });

        setMode('room');
        updateRoomList();
        render();
    </script>
</body>
</html>
