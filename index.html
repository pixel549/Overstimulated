<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overstimulated - Personal Space Invaders</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="stage-atmosphere" aria-hidden="true">
            <div class="ambient-orb orb-sky"></div>
            <div class="ambient-orb orb-gold"></div>
            <div class="ambient-orb orb-rose"></div>
            <div class="ambient-scan"></div>
        </div>

        <div id="game-brand" aria-hidden="true">
            <div class="brand-kicker">Domestic Pressure Sim</div>
            <div class="brand-title">OVERSTIMULATED</div>
            <div class="brand-meta">WASD move | E act / hold | Q bark | R talk</div>
            <div class="brand-badges">
                <span class="brand-chip">DAY 1 MATTERS</span>
                <span class="brand-chip">DAY 2: MUNTY</span>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="touch-controls">
            <div class="touch-pad">
                <button class="touch-btn touch-dir" data-touch="up">UP</button>
                <div class="touch-row">
                    <button class="touch-btn touch-dir" data-touch="left">LEFT</button>
                    <button class="touch-btn touch-dir" data-touch="down">DOWN</button>
                    <button class="touch-btn touch-dir" data-touch="right">RIGHT</button>
                </div>
            </div>

            <div class="touch-actions">
                <button class="touch-btn touch-action" data-touch="sprinting">RUN</button>
                <button class="touch-btn touch-action" data-touch="interact">TALK</button>
                <button class="touch-btn touch-action" data-touch="bark">BARK</button>
                <button class="touch-btn touch-action primary" data-touch="action">ACT</button>
            </div>
        </div>

        <div id="modal" style="display: none;">
            <div id="modal-content">
                <div class="modal-kicker">Run Report</div>
                <h2 id="modal-title"></h2>
                <p id="modal-text"></p>
                <button id="modal-button">CONTINUE</button>
            </div>
        </div>

        <div id="playtest-panel">
            <div id="playtest-header">
                <div id="playtest-heading">
                    <div id="playtest-title">PLAYTEST BOT</div>
                    <div id="playtest-status">OFFLINE</div>
                </div>
                <button class="playtest-btn" id="playtest-collapse" type="button">LESS</button>
            </div>
            <div class="playtest-section summary-section">
                <div class="playtest-label">RUN SUMMARY</div>
                <pre id="playtest-summary">Toggle the bot to start an autoplay run.</pre>
            </div>
            <div class="playtest-section details-section">
                <div class="playtest-label">LIVE INFO</div>
                <pre id="playtest-details">Waiting for run data.</pre>
            </div>
            <div class="playtest-section events-section">
                <div class="playtest-label">EVENT LOG</div>
                <pre id="playtest-events">No events yet.</pre>
            </div>
            <div id="playtest-actions">
                <button class="playtest-btn" id="playtest-toggle" type="button">START</button>
                <button class="playtest-btn" id="playtest-speed" type="button">1x</button>
                <button class="playtest-btn" id="playtest-export" type="button">EXPORT</button>
                <button class="playtest-btn" id="playtest-reset" type="button">RESET</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
